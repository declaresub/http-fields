# Read the Docs build configuration.
# Docs are built with Sphinx + MyST from the Markdown sources in docs/.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_checkout:
      # Full history + tags so setuptools_scm can derive the package version
      # (autodoc imports the installed package).
      - git fetch --unshallow || true
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    install:
      # Installs the project plus the `docs` dependency group, resolved from
      # the committed uv.lock, into uv's virtual environment.
      - uv sync --group docs
    build:
      html:
        - uv run sphinx-build -b html -W docs $READTHEDOCS_OUTPUT/html

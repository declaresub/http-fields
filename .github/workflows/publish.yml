name: Publish

# Tag-driven release. Publishing is gated on the `testpypi` then `pypi` protected
# environments, each of which requires a manual approval. A workflow_dispatch run is a
# no-publish dry-run: it builds and generates the SBOM only (the publish/OIDC/Sigstore
# steps cannot run outside a tag).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # hatch-vcs derives the version from tags
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false # caching in a publish workflow risks cache poisoning

      - name: Build sdist and wheel
        run: uv build

      - name: Show derived version
        run: ls -l dist/

      # SBOM of the RUNTIME closure only (--no-dev; the project has no runtime extras).
      # Generated outside dist/ so it is never uploaded to the package index.
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p sbom
          uv export --no-dev --no-hashes --no-emit-project \
            --format requirements-txt -o requirements-runtime.txt
          uvx --from cyclonedx-bom cyclonedx-py requirements requirements-runtime.txt \
            --output-format JSON > sbom/http-fields.cdx.json
          python -c "import json;print('SBOM components:',[c['name'] for c in json.load(open('sbom/http-fields.cdx.json'))['components']])"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom/

  testpypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          skip-existing: true

  pypi:
    needs: testpypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          attestations: true

  github-release:
    needs: pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
      id-token: write # Sigstore signing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom/

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          release-signing-artifacts: false

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*
            sbom/*
          generate_release_notes: true
